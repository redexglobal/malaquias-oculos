<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dr. Malaquias — Relatórios Óculos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D0900;--bg2:#1A1200;--bg3:#261A00;--gold:#D4AF37;--gold2:#FFD700;--gold3:#B8860B;--w:#FFF;--w3:#C9A85C;--w4:#7A6030;--brd:rgba(212,175,55,.2);--brd2:rgba(212,175,55,.1);--r:#FF4D6D;--g:#00E676;--y:#FFD60A;}
[data-theme="light"]{--bg:#FBF6E9;--bg2:#FFF;--bg3:#F5EDD6;--w:#1A1000;--w3:#7A5A20;--w4:#B8960A;--brd:rgba(180,140,30,.3);--brd2:rgba(180,140,30,.15);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--w);font-family:'Inter',sans-serif;min-height:100vh;transition:background .3s,color .3s;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:2px;}
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(212,175,55,.003) 3px,rgba(212,175,55,.003) 4px);}
.gold-strip{height:4px;background:linear-gradient(90deg,#3D2800,var(--gold3),var(--gold2),var(--gold),var(--gold3),#3D2800);box-shadow:0 0 18px rgba(255,215,0,.5);}
nav{position:sticky;top:0;z-index:200;height:62px;background:rgba(13,9,0,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;gap:1rem;}
[data-theme="light"] nav{background:rgba(251,246,233,.95);}
.nav-brand{display:flex;align-items:center;gap:.7rem;flex-shrink:0;}
.nav-logo{width:36px;height:36px;border-radius:10px;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);display:grid;place-items:center;}
.nav-title{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:800;color:var(--w);}
.nav-sub{font-size:.52rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-top:.1rem;}
.nav-links{display:flex;gap:.2rem;}
.nav-link{padding:.38rem .9rem;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;border:none;background:none;color:var(--w3);transition:all .2s;text-decoration:none;font-family:'Inter',sans-serif;}
.nav-link:hover{color:var(--w);background:rgba(212,175,55,.08);}
.nav-link.active{color:var(--gold);background:rgba(212,175,55,.12);border:1px solid var(--brd);}
.proj-switch{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--brd);border-radius:10px;padding:3px;}
.proj-btn{padding:.32rem .85rem;border-radius:7px;font-size:.72rem;font-weight:700;cursor:pointer;border:none;background:none;color:var(--w3);transition:all .2s;font-family:'Space Grotesk',sans-serif;}
.proj-btn.active{background:var(--gold);color:#0D0900;}
.nav-right{display:flex;align-items:center;gap:.6rem;flex-shrink:0;}
.admin-badge{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:700;color:var(--gold);background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);padding:.22rem .7rem;border-radius:50px;}
.btn-icon{width:34px;height:34px;border-radius:8px;border:1px solid var(--brd);background:var(--bg3);cursor:pointer;display:grid;place-items:center;transition:all .2s;color:var(--w3);}
.btn-icon:hover{border-color:var(--gold);color:var(--gold);}
.btn-logout{background:none;border:1px solid rgba(255,77,109,.3);color:var(--r);padding:.32rem .8rem;border-radius:8px;font-size:.72rem;font-weight:600;cursor:pointer;}
.btn-logout:hover{background:rgba(255,77,109,.1);}
main{padding:1.5rem;max-width:1600px;margin:0 auto;}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;}
@media(max-width:900px){.summary-grid{grid-template-columns:1fr 1fr;}}
.sum-card{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:1.3rem 1.5rem;position:relative;overflow:hidden;}
.sum-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(212,175,55,.04),transparent);pointer-events:none;}
.sum-label{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--w3);margin-bottom:.5rem;}
.sum-val{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:800;color:var(--gold);}
.sum-delta{display:flex;align-items:center;gap:.3rem;margin-top:.4rem;font-size:.72rem;font-weight:600;}
.delta-up{color:var(--g);}
.delta-dn{color:var(--r);}
.delta-neu{color:var(--w3);}
.alerts-section{margin-bottom:1.5rem;}
.sec-title{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700;margin-bottom:.8rem;display:flex;align-items:center;gap:.6rem;}
.sec-title::before{content:'';width:3px;height:.9rem;background:var(--gold);border-radius:2px;}
.alert-item{background:rgba(255,77,109,.07);border:1px solid rgba(255,77,109,.25);border-radius:10px;padding:.75rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.8rem;font-size:.82rem;}
.alert-sub{font-size:.7rem;color:var(--r);margin-top:.15rem;}
.no-alerts{background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.2);border-radius:10px;padding:.75rem 1rem;font-size:.82rem;color:var(--g);}
.table-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;flex-wrap:wrap;gap:.5rem;}
.toolbar-left{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;}
.search-input{background:var(--bg2);border:1px solid var(--brd);color:var(--w);border-radius:8px;padding:.42rem .85rem;font-size:.8rem;outline:none;width:240px;transition:border-color .2s;}
.search-input:focus{border-color:var(--gold);}
.search-input::placeholder{color:var(--w4);}
.filter-sel{background:var(--bg2);border:1px solid var(--brd);color:var(--w);border-radius:8px;padding:.42rem .75rem;font-size:.78rem;outline:none;cursor:pointer;}
.filter-sel option{background:var(--bg2);}
.btn-export{background:var(--gold);color:#0D0900;border:none;padding:.45rem 1.1rem;border-radius:8px;font-size:.78rem;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .2s;}
.btn-export:hover{background:var(--gold2);}
.table-wrap{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;overflow:hidden;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:.56rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--w3);padding:.75rem 1.2rem;text-align:left;border-bottom:1px solid var(--brd);}
.tbl td{font-size:.8rem;padding:.68rem 1.2rem;border-bottom:1px solid var(--brd2);color:var(--w);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(212,175,55,.03);}
.badge{font-size:.58rem;font-weight:700;padding:.15rem .5rem;border-radius:50px;}
.badge-ok{background:rgba(0,230,118,.1);color:var(--g);border:1px solid rgba(0,230,118,.25);}
.badge-med{background:rgba(255,214,10,.1);color:var(--y);border:1px solid rgba(255,214,10,.3);}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.2rem;border-top:1px solid var(--brd);font-size:.75rem;color:var(--w3);}
.pag-btns{display:flex;gap:.4rem;}
.pag-btn{padding:.3rem .7rem;border:1px solid var(--brd);border-radius:6px;background:none;color:var(--w3);cursor:pointer;font-size:.72rem;transition:all .2s;}
.pag-btn:hover{border-color:var(--gold);color:var(--gold);}
.pag-btn.active{background:var(--gold);color:#0D0900;border-color:var(--gold);}
.page-loader{position:fixed;inset:0;background:var(--bg);display:grid;place-items:center;z-index:9000;}
.page-loader.hide{display:none;}
.spinner{width:42px;height:42px;border:3px solid var(--brd);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="spinner"></div></div>
<div class="gold-strip"></div>
<nav>
  <div class="nav-brand">
    <div class="nav-logo">
      <svg width="22" height="14" viewBox="0 0 52 26" fill="none">
        <rect x="1" y="5" width="20" height="14" rx="7" stroke="#D4AF37" stroke-width="2" fill="rgba(212,175,55,.1)"/>
        <rect x="31" y="5" width="20" height="14" rx="7" stroke="#D4AF37" stroke-width="2" fill="rgba(212,175,55,.1)"/>
        <line x1="21" y1="12" x2="31" y2="12" stroke="#D4AF37" stroke-width="2"/>
        <line x1="1" y1="9" x2="0" y2="4" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="51" y1="9" x2="52" y2="4" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div><div class="nav-title">Dr. Malaquias</div><div class="nav-sub">Relatórios</div></div>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="admin.html">🏠 Visão Geral</a>
    <a class="nav-link" href="dashboard.html">📊 Dashboard</a>
    <a class="nav-link active" href="relatorios.html">📋 Relatórios</a>
  </div>
  <div class="proj-switch">
    <button class="proj-btn" id="btn-fibro" onclick="switchProject('fibromialgia')">🫀 Fibromialgia</button>
    <button class="proj-btn active" id="btn-oculos" onclick="switchProject('oculos')">👓 Óculos</button>
  </div>
  <div class="nav-right">
    <div class="admin-badge" id="adminBadge">—</div>
    <button class="btn-icon" onclick="toggleTheme()">☀️</button>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</nav>

<main>
  <div class="summary-grid">
    <div class="sum-card"><div class="sum-label">Esta Semana</div><div class="sum-val" id="s-semana">—</div><div class="sum-delta" id="sd-semana"><span>—</span></div></div>
    <div class="sum-card"><div class="sum-label">Semana Anterior</div><div class="sum-val" id="s-prev">—</div><div class="sum-delta delta-neu"><span>período anterior</span></div></div>
    <div class="sum-card"><div class="sum-label">Variação</div><div class="sum-val" id="s-var">—</div><div class="sum-delta" id="sd-var"><span>—</span></div></div>
  </div>
  <div class="alerts-section">
    <div class="sec-title">⚠️ Alertas — Pontos Inativos</div>
    <div id="alertsList"></div>
  </div>
  <div class="table-toolbar">
    <div class="toolbar-left">
      <input class="search-input" id="searchInput" placeholder="🔍 Buscar por nome, WhatsApp..." oninput="filterAndRender()">
      <select class="filter-sel" id="filterStatus" onchange="filterAndRender()">
        <option value="">Todos os status</option>
        <option value="aguardando">Aguardando</option>
        <option value="em_producao">Em produção</option>
        <option value="pronto">Pronto</option>
        <option value="entregue">Entregue</option>
      </select>
    </div>
    <button class="btn-export" onclick="exportCSV()">📥 Exportar CSV</button>
  </div>
  <div class="table-wrap">
    <table class="tbl">
      <thead><tr><th>#</th><th>Paciente</th><th>Ponto</th><th>WhatsApp</th><th>Graus OD/OE</th><th>Lente</th><th>Status</th><th>Entrega</th><th>Cadastrado em</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="pagination"><span id="pag-info">—</span><div class="pag-btns" id="pagBtns"></div></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPA_URL='https://vuylzbefjwbtibhnczih.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1eWx6YmVmandidGliaG5jemloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMDUxNTIsImV4cCI6MjA5MzY4MTE1Mn0.c2SJ6Yw7O5bGK8lqBtDFkiWke2UNX4I9NJiJ25xprBM';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

let activeProject='oculos';let allData=[];let pontosData=[];let filteredData=[];let page=0;
const PAGE_SIZE=20;
const statusLabels={aguardando:'⏳ Aguardando',em_producao:'⚙️ Em produção',pronto:'✅ Pronto',entregue:'📦 Entregue'};

(async()=>{
  const theme=localStorage.getItem('adminTheme')||'dark';
  document.documentElement.setAttribute('data-theme',theme);
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  const {data:prof}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
  if(!prof||prof.papel!=='admin'){window.location.href='index.html';return;}
  document.getElementById('adminBadge').textContent=prof.nome||prof.email;
  document.getElementById('pageLoader').classList.add('hide');
  await loadAll();
})();

async function loadAll(){
  const table=activeProject==='fibromialgia'?'pacientes_fibro':'pacientes_oculos';
  const [{data:pontos},{data:patients}]=await Promise.all([
    sb.from('profiles').select('id,nome,numero_ponto,tipo_ponto,nome_editavel').eq('papel','colaborador').eq('projeto',activeProject).order('numero_ponto'),
    sb.from(table).select('*').order('created_at',{ascending:false}).limit(5000)
  ]);
  pontosData=pontos||[];allData=patients||[];
  renderSummary();renderAlerts();filterAndRender();
}

function renderSummary(){
  const now=new Date();
  const startWeek=new Date(now);startWeek.setDate(now.getDate()-now.getDay());startWeek.setHours(0,0,0,0);
  const startPrev=new Date(startWeek);startPrev.setDate(startPrev.getDate()-7);
  const endPrev=new Date(startWeek);endPrev.setMilliseconds(-1);
  const wc=allData.filter(p=>p.created_at&&new Date(p.created_at)>=startWeek).length;
  const pc=allData.filter(p=>p.created_at&&new Date(p.created_at)>=startPrev&&new Date(p.created_at)<=endPrev).length;
  animNum('s-semana',wc);animNum('s-prev',pc);
  const varPct=pc>0?Math.round((wc-pc)/pc*100):wc>0?100:0;
  document.getElementById('s-var').textContent=(varPct>=0?'+':'')+varPct+'%';
  document.getElementById('sd-semana').innerHTML=`<span class="${wc>=pc?'delta-up':'delta-dn'}">${wc>=pc?'↑':'↓'} vs semana anterior</span>`;
  document.getElementById('sd-var').innerHTML=`<span class="${varPct>=0?'delta-up':'delta-dn'}">${varPct>=0?'Crescimento':'Queda'} semanal</span>`;
}

function renderAlerts(){
  const pontoMap={};
  pontosData.forEach(p=>pontoMap[p.id]={nome:p.nome_editavel||p.nome,num:p.numero_ponto,lastDate:null});
  allData.forEach(p=>{if(pontoMap[p.ponto_id]&&p.created_at){const d=new Date(p.created_at);if(!pontoMap[p.ponto_id].lastDate||d>pontoMap[p.ponto_id].lastDate)pontoMap[p.ponto_id].lastDate=d;}});
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-2);cutoff.setHours(0,0,0,0);
  const inativos=Object.values(pontoMap).filter(p=>!p.lastDate||p.lastDate<cutoff);
  const el=document.getElementById('alertsList');
  if(!inativos.length){el.innerHTML='<div class="no-alerts">✅ Todos os pontos registraram atividade nos últimos 2 dias.</div>';return;}
  el.innerHTML=inativos.map(p=>{const dias=p.lastDate?Math.floor((Date.now()-p.lastDate.getTime())/86400000):null;return`<div class="alert-item"><span>⚠️</span><div>Ponto ${String(p.num).padStart(2,'0')} — ${p.nome}<div class="alert-sub">${dias!=null?'Último registro há '+dias+' dia'+(dias!==1?'s':''):'Nenhum registro ainda'}</div></div></div>`;}).join('');
}

function filterAndRender(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const stfil=document.getElementById('filterStatus').value;
  filteredData=allData.filter(p=>{
    const matchQ=!q||(p.nome_paciente||'').toLowerCase().includes(q)||(p.whatsapp||'').includes(q);
    const matchSt=!stfil||(p.status_pedido||'aguardando')===stfil;
    return matchQ&&matchSt;
  });
  page=0;renderTable();
}

function renderTable(){
  const pontoMap={};pontosData.forEach(p=>pontoMap[p.id]=p);
  const start=page*PAGE_SIZE;const slice=filteredData.slice(start,start+PAGE_SIZE);
  document.getElementById('pag-info').textContent=filteredData.length+' registro'+(filteredData.length!==1?'s':'')+' encontrado'+(filteredData.length!==1?'s':'');
  if(!slice.length){document.getElementById('tableBody').innerHTML='<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--w3);">Nenhum registro encontrado.</td></tr>';renderPagination();return;}
  const stColors={aguardando:'badge-med',em_producao:'badge-ok',pronto:'badge-ok',entregue:''};
  document.getElementById('tableBody').innerHTML=slice.map((r,i)=>{
    const ponto=pontoMap[r.ponto_id];
    const st=r.status_pedido||'aguardando';
    const dt=r.data_entrega?new Date(r.data_entrega+'T00:00:00').toLocaleDateString('pt-BR'):'—';
    const cAt=r.created_at?new Date(r.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
    return`<tr><td style="color:var(--w3);">${start+i+1}</td><td><strong>${r.nome_paciente||'—'}</strong>${r.idade?'<br><span style="font-size:.7rem;color:var(--w3);">'+r.idade+' anos</span>':''}</td><td style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--gold);">${ponto?String(ponto.numero_ponto).padStart(2,'0')+'<br><span style="font-size:.7rem;color:var(--w3);font-family:Inter,sans-serif;font-weight:400;">'+(ponto.nome_editavel||ponto.nome)+'</span>':'—'}</td><td style="color:var(--w3);">${r.whatsapp||'—'}</td><td style="font-size:.75rem;">OD: ${r.grau_od||'—'}<br>OE: ${r.grau_oe||'—'}</td><td>${r.lente_tipo||'—'}</td><td><span class="badge ${stColors[st]||''}">${statusLabels[st]||st}</span></td><td>${dt}</td><td style="color:var(--w3);font-size:.73rem;">${cAt}</td></tr>`;
  }).join('');
  renderPagination();
}

function renderPagination(){
  const total=Math.ceil(filteredData.length/PAGE_SIZE);const btns=document.getElementById('pagBtns');btns.innerHTML='';
  if(total<=1)return;
  for(let i=0;i<Math.min(total,10);i++){const b=document.createElement('button');b.className='pag-btn'+(i===page?' active':'');b.textContent=i+1;const pi=i;b.onclick=()=>{page=pi;renderTable();};btns.appendChild(b);}
}

function exportCSV(){
  const pontoMap={};pontosData.forEach(p=>pontoMap[p.id]=p);
  const header=['#','Nome','Idade','Ponto','WhatsApp','Grau OD','Grau OE','Lente','Armação','Status','Data Entrega','Cadastrado em','Observações'];
  const rows=filteredData.map((r,i)=>{const ponto=pontoMap[r.ponto_id];return[i+1,r.nome_paciente||'',r.idade||'',ponto?String(ponto.numero_ponto).padStart(2,'0')+' – '+(ponto.nome_editavel||ponto.nome):'',r.whatsapp||'',r.grau_od||'',r.grau_oe||'',r.lente_tipo||'',r.armacao||'',r.status_pedido||'',r.data_entrega||'',r.created_at?new Date(r.created_at).toLocaleString('pt-BR'):'',r.observacoes||''];});
  const csv=[header,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));a.download='dr-malaquias-oculos-'+new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')+'.csv';a.click();
}

function switchProject(proj){activeProject=proj;document.getElementById('btn-fibro').classList.toggle('active',proj==='fibromialgia');document.getElementById('btn-oculos').classList.toggle('active',proj==='oculos');loadAll();}
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme');const n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('adminTheme',n);}
async function logout(){await sb.auth.signOut();window.location.href='index.html';}
function animNum(id,target){const el=document.getElementById(id);if(!el)return;const dur=500,st=Date.now();(function t(){const p=Math.min((Date.now()-st)/dur,1);el.textContent=Math.round(target*(1-Math.pow(1-p,3)));if(p<1)requestAnimationFrame(t);})();}
</script>
</body>
</html>
