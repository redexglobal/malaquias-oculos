<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dr. Malaquias — Acesso ao Sistema</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#010D05;--bg2:#021508;--bg3:#031e0a;--c:#00E676;--c3:#69F0AE;--w:#fff;--w3:#7DB89A;--w4:#3D6B4A;--brd:rgba(0,230,118,.18);--r:#FF4D6D;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--w);font-family:'Inter',sans-serif;min-height:100vh;display:grid;place-items:center;padding:1rem;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,230,118,.07),transparent);pointer-events:none;}
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,230,118,.003) 3px,rgba(0,230,118,.003) 4px);}
.card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--brd);border-radius:24px;padding:2.8rem 2.5rem;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,230,118,.04),transparent 60%);pointer-events:none;}
.top{display:flex;flex-direction:column;align-items:center;margin-bottom:2rem;}
.icon-wrap{width:72px;height:72px;border-radius:20px;background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.2);display:grid;place-items:center;margin-bottom:.9rem;filter:drop-shadow(0 0 20px rgba(0,230,118,.25));}
.brand{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:.04em;}
.brand-sub{font-size:.58rem;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--c);margin-top:.2rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:.58rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--c);margin-bottom:.4rem;}
.field input{width:100%;background:var(--bg3);border:1px solid var(--brd);color:var(--w);border-radius:10px;padding:.78rem 1rem;font-size:.9rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;}
.field input:focus{border-color:var(--c);box-shadow:0 0 14px rgba(0,230,118,.12);}
.field input::placeholder{color:var(--w4);}
.btn{width:100%;background:var(--c);color:#010D05;border:none;padding:.88rem;border-radius:10px;font-size:.88rem;font-weight:800;font-family:'Space Grotesk',sans-serif;letter-spacing:.08em;cursor:pointer;transition:all .2s;margin-top:.4rem;}
.btn:hover{background:var(--c3);box-shadow:0 0 28px rgba(0,230,118,.4);}
.btn:disabled{opacity:.55;cursor:not-allowed;box-shadow:none;}
.err{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.28);color:var(--r);border-radius:10px;padding:.65rem 1rem;font-size:.8rem;margin-top:.8rem;display:none;}
.err.show{display:block;}
.footer{text-align:center;margin-top:1.8rem;font-size:.63rem;color:var(--w4);letter-spacing:.05em;}
.overlay{position:fixed;inset:0;background:rgba(1,13,5,.9);display:none;place-items:center;z-index:999;}
.overlay.show{display:grid;}
.spinner{width:40px;height:40px;border:3px solid var(--brd);border-top-color:var(--c);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="overlay" id="loader"><div class="spinner"></div></div>
<div class="card">
  <div class="top">
    <div class="icon-wrap">
      <svg width="40" height="26" viewBox="0 0 52 26" fill="none">
        <rect x="1" y="5" width="20" height="14" rx="7" stroke="#00E676" stroke-width="2" fill="rgba(0,230,118,.08)"/>
        <rect x="31" y="5" width="20" height="14" rx="7" stroke="#00E676" stroke-width="2" fill="rgba(0,230,118,.08)"/>
        <line x1="21" y1="12" x2="31" y2="12" stroke="#00E676" stroke-width="2"/>
        <line x1="1" y1="9" x2="0" y2="4" stroke="#00E676" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="51" y1="9" x2="52" y2="4" stroke="#00E676" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="11" cy="12" r="3" fill="rgba(0,230,118,.2)" stroke="#00E676" stroke-width="1"/>
        <circle cx="41" cy="12" r="3" fill="rgba(0,230,118,.2)" stroke="#00E676" stroke-width="1"/>
      </svg>
    </div>
    <div class="brand">Dr. Malaquias</div>
    <div class="brand-sub">Sistema · Óculos</div>
  </div>
  <div class="field"><label>E-mail</label><input id="email" type="email" placeholder="seu@email.com" autocomplete="email"></div>
  <div class="field"><label>Senha</label><input id="senha" type="password" placeholder="••••••••" autocomplete="current-password"></div>
  <button class="btn" id="btnLogin" onclick="login()">Acessar Sistema →</button>
  <div class="err" id="err"></div>
  <div class="footer">Dr. Malaquias · Sistema de Gestão © 2026</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPA_URL='https://vuylzbefjwbtibhnczih.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1eWx6YmVmandidGliaG5jemloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMDUxNTIsImV4cCI6MjA5MzY4MTE1Mn0.c2SJ6Yw7O5bGK8lqBtDFkiWke2UNX4I9NJiJ25xprBM';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

(async()=>{
  document.getElementById('loader').classList.add('show');
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    const {data:prof}=await sb.from('profiles').select('papel').eq('id',session.user.id).single();
    window.location.href=prof?.papel==='admin'?'admin.html':'painel.html';
    return;
  }
  document.getElementById('loader').classList.remove('show');
})();

async function login(){
  const email=document.getElementById('email').value.trim();
  const senha=document.getElementById('senha').value;
  const btn=document.getElementById('btnLogin');
  const err=document.getElementById('err');
  if(!email||!senha){err.textContent='Preencha e-mail e senha.';err.classList.add('show');return;}
  btn.disabled=true;btn.textContent='Verificando...';err.classList.remove('show');
  const {error}=await sb.auth.signInWithPassword({email,password:senha});
  if(error){err.textContent='E-mail ou senha incorretos.';err.classList.add('show');btn.disabled=false;btn.textContent='Acessar Sistema →';return;}
  const {data:{user}}=await sb.auth.getUser();
  const {data:prof}=await sb.from('profiles').select('papel').eq('id',user.id).single();
  window.location.href=prof?.papel==='admin'?'admin.html':'painel.html';
}
document.getElementById('senha').onkeypress=e=>{if(e.key==='Enter')login();};
document.getElementById('email').onkeypress=e=>{if(e.key==='Enter')document.getElementById('senha').focus();};
</script>
</body>
</html>
